version: '3.9'

services:
  # ── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mirage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mirage_db
      POSTGRES_USER: mirage
      POSTGRES_PASSWORD: mirage_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirage -d mirage_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mirage_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://mirage:mirage_pass@db:5432/mirage_db
      SECRET_KEY: ${SECRET_KEY:-mirage-super-secret-key-change-in-production-abc123}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:80","http://frontend"]'
      SIMULATOR_INTERVAL_SECONDS: "3.0"
    volumes:
      - model_data:/app/models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: mirage_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  model_data:
    driver: local

networks:
  default:
    name: mirage_network
